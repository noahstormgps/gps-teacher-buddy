name: Deploy Edge Function GPS Docente

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Nome da Edge Function a deployar (ex: sala-generate, conta-generate)'
        required: true
        default: 'sala-generate'
      confirm:
        description: 'Digite CONFIRMAR para executar o deploy'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'CONFIRMAR'
    permissions:
      contents: read

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.100.0

      - name: Conferir versão do Supabase CLI
        run: supabase --version

      - name: Deploy ${{ github.event.inputs.function_name }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase functions deploy ${{ github.event.inputs.function_name }} \
            --project-ref "$SUPABASE_PROJECT_REF"
